version: '3.8'
services:
  postgres_db:
    image: postgres:15-alpine
    container_name: ec_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis_broker:
    image: redis:7-alpine
    container_name: ec_redis_broker
    ports:
      - "6379:6379"
  web_api:
    build:
    container_name: ec_fastapi_wev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:admin123@postgres_db:5432/ecommerce_db
      - CELERY_DATABASE_URL=postgresql://postgres:admin123@postgres_db:5432/ecommerce_db
      - REDIS_URL=redis://redis_broker:6379/0
    depends_on:
      - redis_broker
      - postgres_db
  celery_worker:
  build:
  container_name: ec_celery_worker
  command: celery -A app.worker.celery_app worker --loglevel=info
  volumes:
    - .:/workspace
  environment:
    - DATABASE_URL=postgresql+asyncpg://postgres:admin123@postgres_db:5432/ecommerce_db
    - CELERY_DATABASE_URL=postgresql://postgres:admin123@postgres_db:5432/ecommerce_db
    - REDIS_URL=redis://redis_broker:6379/0
  depends_on:
    - redis_broker
    - postgres_db
  volumes:
    postgres_data